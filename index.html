<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SO-101 Simulator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
:root{
  --bg:#EEF0F2;--panel:#F7F8F9;--panel2:#FFFFFF;--ink:#1A1F24;--ink2:#5A636C;--ink3:#99A1A9;
  --line:#D4D9DE;--line-soft:#E4E8EB;--acc:#2F6FED;--acc-soft:#E5EDFD;--ok:#2F9461;
  --sans:'Inter',system-ui,-apple-system,sans-serif;--mono:'IBM Plex Mono','SF Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;font-family:var(--sans);background:var(--bg);color:var(--ink)}
#app{display:flex;flex-direction:column;height:100vh}
.topbar{height:46px;flex-shrink:0;background:var(--panel);border-bottom:1px solid var(--line);display:flex;align-items:center;padding:0 16px;gap:14px}
.topbar b{font-size:13px;letter-spacing:.14em;font-weight:700}
.topbar .sub{font-size:10px;color:var(--ink3);letter-spacing:.1em}
.badge{margin-left:auto;font-size:10px;padding:3px 9px;border:1px solid var(--line);border-radius:3px;color:var(--ink2);background:var(--panel2)}
.badge.ok{color:var(--ok);border-color:var(--ok)}
.main{flex:1;display:flex;min-height:0}
.viewport{flex:1;position:relative;background:linear-gradient(180deg,#F3F5F6,#E7EAEC);min-width:0}
#cv{width:100%;height:100%;display:block}
.hint{position:absolute;left:12px;bottom:10px;font-size:10px;color:var(--ink3);font-family:var(--mono)}
.vtools{position:absolute;left:12px;top:12px;display:flex;flex-direction:column;gap:5px}
.vtool{background:var(--panel2);border:1px solid var(--line);border-radius:3px;color:var(--ink2);font-size:11px;padding:5px 9px;cursor:pointer;text-align:left;min-width:96px;transition:all .12s}
.vtool:hover{border-color:var(--acc);color:var(--acc)}
.vtool.on{background:var(--acc-soft);border-color:var(--acc);color:var(--acc)}
.right{width:312px;flex-shrink:0;background:var(--panel);border-left:1px solid var(--line);display:flex;flex-direction:column;min-height:0}
.right-head{padding:9px 13px;border-bottom:1px solid var(--line-soft);display:flex;align-items:center;gap:8px}
.right-head b{font-size:10px;font-weight:600;color:var(--ink2);text-transform:uppercase;letter-spacing:.12em}
.jcount{margin-left:auto;font-size:10px;color:var(--ink3);font-family:var(--mono)}
.joints{flex:1;overflow-y:auto;padding:10px 12px}
.ji{margin-bottom:6px;background:var(--panel2);border:1px solid var(--line-soft);border-left:2px solid var(--line);border-radius:3px;padding:8px 11px}
.ji-head{display:flex;align-items:center;gap:7px;margin-bottom:7px}
.ji-name{font-size:11.5px;font-weight:600;font-family:var(--mono);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ji-type{font-size:8px;color:var(--ink3);border:1px solid var(--line-soft);border-radius:2px;padding:1px 4px;text-transform:uppercase;font-family:var(--mono);flex-shrink:0}
.ji-nudge-grp{margin-left:auto;display:flex;align-items:center;gap:3px}
.ji-nudge{width:20px;height:20px;display:flex;align-items:center;justify-content:center;background:var(--panel2);border:1px solid var(--line-soft);border-radius:2px;color:var(--ink2);font-size:13px;cursor:pointer;user-select:none}
.ji-nudge:hover{border-color:var(--acc);color:var(--acc)}
.ji-nudge:active{background:var(--acc-soft)}
.ji-val{font-size:11px;font-family:var(--mono);color:var(--ink);min-width:42px;text-align:right}
input[type=range]{width:100%;height:4px;-webkit-appearance:none;appearance:none;background:var(--line-soft);border-radius:2px;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:13px;height:13px;background:var(--panel2);border:2px solid var(--acc);border-radius:50%;cursor:pointer}
input[type=range]::-moz-range-thumb{width:13px;height:13px;background:var(--panel2);border:2px solid var(--acc);border-radius:50%;cursor:pointer}
.no-joint{color:var(--ink3);font-size:12px;text-align:center;padding:30px 0}
.right-foot{flex-shrink:0;border-top:1px solid var(--line);padding:10px 12px;display:flex;gap:6px}
.fbtn{flex:1;padding:7px;background:var(--panel2);border:1px solid var(--line-soft);border-radius:3px;color:var(--ink2);font-size:11px;cursor:pointer;text-align:center;transition:all .12s}
.fbtn:hover{border-color:var(--acc);color:var(--acc)}
/* timeline */
.timeline{flex-shrink:0;height:150px;background:var(--panel);border-top:1px solid var(--line);display:flex;flex-direction:column}
.tl-ctrl{display:flex;align-items:center;gap:7px;padding:8px 12px;border-bottom:1px solid var(--line-soft);flex-wrap:wrap}
.tl-btn{padding:4px 9px;background:var(--panel2);border:1px solid var(--line-soft);border-radius:3px;color:var(--ink2);font-size:11px;cursor:pointer;white-space:nowrap;transition:all .12s;font-family:var(--sans)}
.tl-btn:hover{border-color:var(--acc);color:var(--acc)}
.tl-btn.on{background:var(--acc-soft);border-color:var(--acc);color:var(--acc)}
.tl-btn.accent{background:var(--ink);color:#fff;border-color:var(--ink)}
.tl-time{font-family:var(--mono);font-size:12px;color:var(--ink);min-width:54px}
.tl-sep{width:1px;height:18px;background:var(--line)}
.tl-dur{width:50px;background:var(--panel2);border:1px solid var(--line-soft);border-radius:3px;color:var(--ink);font-size:11px;padding:3px 5px;text-align:center;font-family:var(--mono);outline:none}
.tl-sel{background:var(--panel2);border:1px solid var(--line-soft);border-radius:3px;color:var(--ink2);font-size:11px;padding:3px 6px;outline:none;font-family:var(--mono);cursor:pointer}
.tl-info{margin-left:auto;font-size:10px;color:var(--ink3);font-family:var(--mono)}
.tl-track{flex:1;position:relative;min-height:0}
#tlcv{width:100%;height:100%;display:block;cursor:pointer}
.overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(243,245,246,.92);z-index:20;flex-direction:column;gap:14px}
.spinner{width:30px;height:30px;border:3px solid var(--line);border-top-color:var(--acc);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.ov-title{font-size:12px;color:var(--ink2);letter-spacing:.08em}
.ov-sub{font-size:11px;color:var(--ink3);font-family:var(--mono)}
.pbar-wrap{width:240px;height:3px;background:var(--line-soft);border-radius:2px;overflow:hidden}
.pbar{height:100%;width:0;background:var(--acc);transition:width .2s}
.hidden-file{position:absolute;width:0;height:0;opacity:0}
</style>
</head>
<body>
<div id="app">
  <div class="topbar">
    <b>SO-101</b><span class="sub">WEB SIMULATOR</span>
    <span class="badge" id="badge">로딩…</span>
  </div>
  <div class="main">
    <div class="viewport">
      <canvas id="cv"></canvas>
      <div class="vtools">
        <button class="vtool on" id="tGrid">그리드</button>
        <button class="vtool" id="tWire">와이어프레임</button>
        <button class="vtool" id="tAxes">관절축</button>
      </div>
      <div class="hint">좌:회전 · 우:이동 · 휠:줌</div>
      <div class="overlay" id="ov">
        <div class="spinner" id="spin"></div>
        <div class="ov-title" id="ovTitle">data/ 에서 불러오는 중…</div>
        <div class="pbar-wrap"><div class="pbar" id="pbar"></div></div>
        <div class="ov-sub" id="ovSub">URDF 가져오는 중…</div>
      </div>
    </div>
    <div class="right">
      <div class="right-head"><b>관절</b><input id="search" placeholder="검색" style="flex:1;background:var(--panel2);border:1px solid var(--line-soft);border-radius:3px;padding:4px 8px;font-size:11px;outline:none;font-family:var(--mono);min-width:0"><span class="jcount" id="jcount">-</span></div>
      <div class="joints" id="joints"><div class="no-joint">로딩 중…</div></div>
      <div class="right-foot">
        <button class="fbtn" id="resetBtn">↺ 리셋(0)</button>
        <button class="fbtn" id="homeBtn">⌂ 홈 저장</button>
      </div>
    </div>
  </div>
  <div class="timeline">
    <div class="tl-ctrl">
      <button class="tl-btn" id="tlPlay">▶</button>
      <button class="tl-btn" id="tlStop">■</button>
      <span class="tl-time" id="tlTime">0.0s</span>
      <button class="tl-btn accent" id="tlAdd">+ 키프레임</button>
      <button class="tl-btn" id="tlDel">✕ 삭제</button>
      <div class="tl-sep"></div>
      <span style="font-size:10px;color:var(--ink3)">길이</span>
      <input class="tl-dur" id="tlDur" type="number" value="30" min="1" max="120" step="1">
      <span style="font-size:10px;color:var(--ink3)">s</span>
      <button class="tl-btn" id="tlLoop">루프</button>
      <select class="tl-sel" id="tlSpeed"><option value="0.5">0.5×</option><option value="1" selected>1×</option><option value="2">2×</option></select>
      <div class="tl-sep"></div>
      <button class="tl-btn" id="tlSave">⬇ 저장</button>
      <button class="tl-btn" id="tlLoad">⬆ 불러오기</button>
      <input type="file" id="tlFile" accept=".json" class="hidden-file">
      <span class="tl-info" id="tlInfo">키프레임 0</span>
    </div>
    <div class="tl-track"><canvas id="tlcv"></canvas></div>
  </div>
</div>

<script>
const DATA_DIR='data/';
const URDF_NAMES=['so101.urdf','robot.urdf'];

// ───────── STL 파서 (binary/ASCII) ─────────
function parseSTL(buf){
  const dv=new DataView(buf), n=buf.byteLength;
  // ASCII 판별
  const head=new TextDecoder().decode(new Uint8Array(buf,0,Math.min(120,n))).trim();
  let pos=[];
  if(head.startsWith('solid') && n>80 && (function(){const tn=dv.getUint32(80,true);return Math.abs(n-(84+tn*50))>4;})()){
    const txt=new TextDecoder().decode(new Uint8Array(buf));
    const re=/vertex\s+([\-\d.eE]+)\s+([\-\d.eE]+)\s+([\-\d.eE]+)/g;let m;
    while((m=re.exec(txt))){pos.push(+m[1],+m[2],+m[3]);}
  }else{
    const tn=dv.getUint32(80,true);let o=84;
    for(let i=0;i<tn;i++){o+=12;for(let j=0;j<3;j++){pos.push(dv.getFloat32(o,true),dv.getFloat32(o+4,true),dv.getFloat32(o+8,true));o+=12;}o+=2;}
  }
  const g=new THREE.BufferGeometry();
  g.setAttribute('position',new THREE.Float32BufferAttribute(pos,3));
  g.computeVertexNormals();return g;
}

// ───────── URDF 파서 (다중메시 + rpy) ─────────
function parseOrigin(el){
  if(!el)return{xyz:[0,0,0],rpy:[0,0,0]};
  return{xyz:(el.getAttribute('xyz')||'0 0 0').trim().split(/\s+/).map(Number),
         rpy:(el.getAttribute('rpy')||'0 0 0').trim().split(/\s+/).map(Number)};
}
function parseURDF(xml){
  const doc=new DOMParser().parseFromString(xml,'text/xml');
  const mats={};
  doc.querySelectorAll('robot>material').forEach(m=>{const c=m.querySelector('color');if(c&&m.getAttribute('name'))mats[m.getAttribute('name')]=(c.getAttribute('rgba')||'').trim().split(/\s+/).map(Number);});
  const links={},joints={};
  doc.querySelectorAll('robot>link').forEach(el=>{
    const name=el.getAttribute('name');const visuals=[];
    el.querySelectorAll('visual').forEach(v=>{
      const me=v.querySelector('geometry mesh');if(!me)return;
      const fn=me.getAttribute('filename')||'';
      const sc=(me.getAttribute('scale')||'1 1 1').trim().split(/\s+/).map(Number);
      let rgba=null;const mm=v.querySelector('material');
      if(mm){const c=mm.querySelector('color');if(c)rgba=(c.getAttribute('rgba')||'').trim().split(/\s+/).map(Number);else if(mm.getAttribute('name')&&mats[mm.getAttribute('name')])rgba=mats[mm.getAttribute('name')];}
      visuals.push({fn,sc,origin:parseOrigin(v.querySelector('origin')),rgba});
    });
    links[name]={name,visuals};
  });
  doc.querySelectorAll('robot>joint').forEach(el=>{
    const name=el.getAttribute('name'),type=el.getAttribute('type')||'fixed';
    const parent=el.querySelector('parent')?.getAttribute('link')||'';
    const child=el.querySelector('child')?.getAttribute('link')||'';
    const axis=((el.querySelector('axis')?.getAttribute('xyz'))||'0 0 1').trim().split(/\s+/).map(Number);
    const lim=el.querySelector('limit');
    const lo=lim?+lim.getAttribute('lower'):(type==='prismatic'?0:-3.14159);
    const hi=lim?+lim.getAttribute('upper'):(type==='prismatic'?0.05:3.14159);
    joints[name]={name,type,parent,child,axis,origin:parseOrigin(el.querySelector('origin')),limit:{lower:lo,upper:hi}};
  });
  return{links,joints};
}
const basename=s=>s.split(/[/\\]/).pop().toLowerCase();
const sid=n=>n.replace(/\W/g,'_');
const sleep=ms=>new Promise(r=>setTimeout(r,ms));

// ───────── THREE 셋업 ─────────
const cv=document.getElementById('cv');
const renderer=new THREE.WebGLRenderer({canvas:cv,antialias:true,preserveDrawingBuffer:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
const scene=new THREE.Scene();
scene.background=new THREE.Color(0xE7EAEC);
const camera=new THREE.PerspectiveCamera(45,1,.001,500);
scene.add(new THREE.AmbientLight(0xffffff,.5));
const dl1=new THREE.DirectionalLight(0xffffff,.85);dl1.position.set(4,9,6);scene.add(dl1);
const dl2=new THREE.DirectionalLight(0x99aaff,.3);dl2.position.set(-5,4,-4);scene.add(dl2);
let grid=new THREE.GridHelper(1.2,24,0xB8BEC5,0xD3D8DD);scene.add(grid);

// 간단 오빗
class Orbit{
  constructor(cam,dom){this.cam=cam;this.dom=dom;this.target=new THREE.Vector3(0,.12,0);this.r=.6;this.th=.7;this.ph=1.1;this._b=-1;
    dom.addEventListener('mousedown',e=>{this._b=e.button;this._x=e.clientX;this._y=e.clientY;});
    addEventListener('mouseup',()=>this._b=-1);
    addEventListener('mousemove',e=>{if(this._b<0)return;const dx=e.clientX-this._x,dy=e.clientY-this._y;this._x=e.clientX;this._y=e.clientY;
      if(this._b===0){this.th-=dx*.008;this.ph=Math.max(.05,Math.min(Math.PI-.05,this.ph-dy*.008));}
      else if(this._b===2){const f=this.r*.0014;const rt=new THREE.Vector3().setFromMatrixColumn(cam.matrix,0);const up=new THREE.Vector3().setFromMatrixColumn(cam.matrix,1);this.target.addScaledVector(rt,-dx*f).addScaledVector(up,dy*f);}
      this.update();});
    dom.addEventListener('wheel',e=>{e.preventDefault();this.r*=(1+Math.sign(e.deltaY)*.1);this.r=Math.max(.05,Math.min(20,this.r));this.update();},{passive:false});
    dom.addEventListener('contextmenu',e=>e.preventDefault());
  }
  update(){const s=Math.sin(this.ph);this.cam.position.set(this.target.x+this.r*s*Math.sin(this.th),this.target.y+this.r*Math.cos(this.ph),this.target.z+this.r*s*Math.cos(this.th));this.cam.lookAt(this.target);}
  focus(box){const c=box.getCenter(new THREE.Vector3());const sz=box.getSize(new THREE.Vector3()).length();this.target.copy(c);this.r=sz*1.4;this.update();}
}
const orbit=new Orbit(camera,cv);
function resize(){const w=cv.clientWidth,h=cv.clientHeight;renderer.setSize(w,h,false);camera.aspect=w/h;camera.updateProjectionMatrix();}
new ResizeObserver(resize).observe(cv);

let robotRoot=null,jointObjs={},baseQs={},basePs={},jointDefs={},allAxes=[],allMeshes=[];
let sliderEls={},valEls={},movJoints=[],homePose={};

function setJointValue(jname,deg){
  const jo=jointObjs[jname],jd=jointDefs[jname];if(!jo||!jd)return;
  const ax=new THREE.Vector3(...jd.axis).normalize();
  if(jd.type==='prismatic'){
    const off=ax.clone().applyQuaternion(baseQs[jname]).multiplyScalar(deg/1000); // mm→m
    jo.position.copy(basePs[jname]).add(off);
  }else{
    jo.quaternion.copy(baseQs[jname]).multiply(new THREE.Quaternion().setFromAxisAngle(ax,deg*Math.PI/180));
  }
}
function fmtVal(jname,v){
  const jd=jointDefs[jname];
  return jd.type==='prismatic'? v.toFixed(0)+'mm' : v.toFixed(0)+'°';
}
function updateLabel(jname){const el=valEls[jname],sl=sliderEls[jname];if(el&&sl)el.textContent=fmtVal(jname,+sl.value);}

function buildSliders(){
  const host=document.getElementById('joints');
  movJoints=Object.values(jointDefs).filter(j=>j.type!=='fixed');
  if(!movJoints.length){host.innerHTML='<div class="no-joint">가동 관절 없음</div>';return;}
  let html='';
  for(const j of movJoints){
    const isP=j.type==='prismatic';
    const lo=isP? j.limit.lower*1000 : j.limit.lower*180/Math.PI;
    const hi=isP? j.limit.upper*1000 : j.limit.upper*180/Math.PI;
    html+=`<div class="ji" data-j="${j.name}">
      <div class="ji-head"><span class="ji-name" title="${j.name}">${j.name}</span><span class="ji-type">${j.type[0]}</span>
        <div class="ji-nudge-grp"><button class="ji-nudge" data-j="${j.name}" data-d="-1">−</button>
        <span class="ji-val" id="v_${sid(j.name)}">0°</span>
        <button class="ji-nudge" data-j="${j.name}" data-d="1">+</button></div></div>
      <input type="range" class="jsl" data-j="${j.name}" min="${Math.round(lo)}" max="${Math.round(hi)}" step="1" value="0" id="s_${sid(j.name)}"></div>`;
  }
  host.innerHTML=html;
  sliderEls={};valEls={};
  host.querySelectorAll('.jsl').forEach(sl=>{
    const jn=sl.dataset.j;sliderEls[jn]=sl;valEls[jn]=document.getElementById('v_'+sid(jn));
    sl.addEventListener('input',()=>{setJointValue(jn,+sl.value);updateLabel(jn);});
  });
  host.querySelectorAll('.ji-nudge').forEach(b=>{
    const rep=()=>{const jn=b.dataset.j,d=+b.dataset.d,sl=sliderEls[jn];let v=Math.max(+sl.min,Math.min(+sl.max,+sl.value+d));sl.value=v;setJointValue(jn,v);updateLabel(jn);};
    let t,iv;
    const start=e=>{e.preventDefault();rep();t=setTimeout(()=>iv=setInterval(rep,60),350);};
    const stop=()=>{clearTimeout(t);clearInterval(iv);};
    b.addEventListener('mousedown',start);b.addEventListener('mouseup',stop);b.addEventListener('mouseleave',stop);
    b.addEventListener('touchstart',start,{passive:false});b.addEventListener('touchend',stop);
  });
  for(const j of movJoints){setJointValue(j.name,0);updateLabel(j.name);}
  document.getElementById('jcount').textContent=movJoints.length+'개';
}

// ───────── 로봇 빌드 ─────────
function getColor(n){const k=n.toLowerCase();
  if(k.includes('jaw')||k.includes('grip')||k.includes('follower'))return 0x4CAF8F;
  if(k.includes('sts3215')||k.includes('motor')||k.includes('servo'))return 0x3A4048;
  if(k.includes('base'))return 0x8C949C;
  if(k.includes('upper')||k.includes('rotation'))return 0xE0863A;
  if(k.includes('under')||k.includes('lower'))return 0xCDA640;
  if(k.includes('wrist'))return 0x4E86C6;
  return 0x9AA2AA;
}
async function buildRobot(urdfTxt,fileMap){
  const{links,joints}=parseURDF(urdfTxt);
  jointDefs=joints;
  if(robotRoot){scene.remove(robotRoot);}
  jointObjs={};baseQs={};basePs={};allAxes=[];allMeshes=[];

  // 필요한 메시 로드
  const need=new Set();
  for(const l of Object.values(links))for(const v of l.visuals){const b=basename(v.fn);if(fileMap[b])need.add(b);}
  const geos={};let i=0;const tot=need.size;
  const pbar=document.getElementById('pbar'),ovSub=document.getElementById('ovSub');
  for(const b of need){
    geos[b]=parseSTL(await fileMap[b].arrayBuffer());
    pbar.style.width=`${(++i/tot)*100}%`;ovSub.textContent=`메시 ${i}/${tot} — ${b}`;
    await sleep(0);
  }
  const childSet=new Set(Object.values(joints).map(j=>j.child));
  const root=Object.keys(links).find(l=>!childSet.has(l))||Object.keys(links)[0];

  function mkLink(lname){
    const link=links[lname];if(!link)return null;
    const grp=new THREE.Group();grp.name='link:'+lname;
    for(const v of link.visuals){const b=basename(v.fn),geo=geos[b];if(!geo)continue;
      const col=(v.rgba&&v.rgba.length>=3)?new THREE.Color(v.rgba[0],v.rgba[1],v.rgba[2]).getHex():getColor(b);
      const mesh=new THREE.Mesh(geo,new THREE.MeshPhongMaterial({color:col,specular:0x111418,shininess:24}));
      mesh.position.set(...v.origin.xyz);mesh.setRotationFromEuler(new THREE.Euler(...v.origin.rpy,'ZYX'));mesh.scale.set(...v.sc);
      allMeshes.push(mesh);grp.add(mesh);}
    const ax=new THREE.AxesHelper(.04);ax.visible=false;allAxes.push(ax);grp.add(ax);
    for(const jt of Object.values(joints).filter(j=>j.parent===lname)){
      const jg=new THREE.Group();jg.name='joint:'+jt.name;
      jg.position.set(...jt.origin.xyz);jg.setRotationFromEuler(new THREE.Euler(...jt.origin.rpy,'ZYX'));
      jointObjs[jt.name]=jg;baseQs[jt.name]=jg.quaternion.clone();basePs[jt.name]=jg.position.clone();
      const c=mkLink(jt.child);if(c)jg.add(c);grp.add(jg);
    }
    return grp;
  }
  robotRoot=mkLink(root);
  robotRoot.rotation.x=-Math.PI/2;   // URDF Z-up → three Y-up
  scene.add(robotRoot);
  const box=new THREE.Box3().setFromObject(robotRoot);
  robotRoot.position.y=-box.min.y;
  // 그리드 크기 맞춤
  const sz=box.getSize(new THREE.Vector3());const gs=Math.max(sz.x,sz.z)*2.2||1;
  scene.remove(grid);grid=new THREE.GridHelper(gs,24,0xB8BEC5,0xD3D8DD);grid.visible=document.getElementById('tGrid').classList.contains('on');scene.add(grid);
  orbit.focus(new THREE.Box3().setFromObject(robotRoot));
  buildSliders();
  movJoints.forEach(j=>homePose[j.name]=0);
}

// ───────── data/ 자동 로드 ─────────
async function autoLoad(){
  const ov=document.getElementById('ov'),spin=document.getElementById('spin'),title=document.getElementById('ovTitle'),ovSub=document.getElementById('ovSub');
  const cb='?t='+Date.now();
  const fail=m=>{spin.style.display='none';title.textContent='자동 로드 실패';ovSub.innerHTML=m+'<br><span style="color:#A0A7AE">data/ 경로 확인 후 새로고침</span>';};
  let urdfTxt=null,urdfName=null;
  for(const nm of URDF_NAMES){try{const r=await fetch(DATA_DIR+nm+cb,{cache:'no-store'});if(r.ok){urdfTxt=await r.text();urdfName=nm;break;}}catch(e){}}
  if(!urdfTxt){fail('data/ 에서 URDF를 찾지 못했습니다 ('+URDF_NAMES.join(', ')+')');return;}
  let links;try{links=parseURDF(urdfTxt).links;}catch(e){fail('URDF 파싱 오류: '+e.message);return;}
  const names=new Set();for(const l of Object.values(links))for(const v of l.visuals){const b=basename(v.fn);if(b)names.add(b);}
  const fileMap={};let i=0;const arr=[...names];
  for(const n of arr){title.textContent='메시 받는 중…';ovSub.textContent=`${++i}/${arr.length} — ${n}`;document.getElementById('pbar').style.width=`${i/arr.length*100}%`;
    try{const r=await fetch(DATA_DIR+n+cb,{cache:'no-store'});if(r.ok){const blob=await r.blob();fileMap[n]=blob;}}catch(e){}
    await sleep(0);
  }
  if(!Object.keys(fileMap).length){fail('data/ 에서 STL을 받지 못했습니다');return;}
  title.textContent='모델 구성 중…';
  try{await buildRobot(urdfTxt,fileMap);}catch(e){fail('빌드 오류: '+e.message);console.error(e);return;}
  ov.style.display='none';
  const b=document.getElementById('badge');b.textContent='완료';b.className='badge ok';
}

// ───────── 뷰 토글 ─────────
document.getElementById('tGrid').addEventListener('click',function(){this.classList.toggle('on');grid.visible=this.classList.contains('on');});
document.getElementById('tWire').addEventListener('click',function(){this.classList.toggle('on');const w=this.classList.contains('on');allMeshes.forEach(m=>m.material.wireframe=w);});
document.getElementById('tAxes').addEventListener('click',function(){this.classList.toggle('on');const v=this.classList.contains('on');allAxes.forEach(a=>a.visible=v);});
document.getElementById('search').addEventListener('input',function(){const q=this.value.toLowerCase();document.querySelectorAll('.ji').forEach(d=>{d.style.display=d.dataset.j.toLowerCase().includes(q)?'':'none';});});
document.getElementById('resetBtn').addEventListener('click',()=>{movJoints.forEach(j=>{const sl=sliderEls[j.name];sl.value=0;setJointValue(j.name,0);updateLabel(j.name);});});
document.getElementById('homeBtn').addEventListener('click',()=>{movJoints.forEach(j=>homePose[j.name]=+sliderEls[j.name].value);document.getElementById('badge').textContent='홈 저장됨';setTimeout(()=>{document.getElementById('badge').textContent='완료';},1200);});

// ───────── 타임라인 (키프레임 모션) ─────────
let keyframes=[],kfId=0,selKf=null,duration=30,curT=0,playing=false,loopMode=false,playSpeed=1,lastFrame=0;
const tlcv=document.getElementById('tlcv'),tlx=tlcv.getContext('2d');
function poseNow(){const p={};movJoints.forEach(j=>p[j.name]=+sliderEls[j.name].value);return p;}
function applyPose(p){movJoints.forEach(j=>{if(p[j.name]==null)return;const sl=sliderEls[j.name];sl.value=p[j.name];setJointValue(j.name,p[j.name]);updateLabel(j.name);});}
function tlResize(){tlcv.width=tlcv.clientWidth*devicePixelRatio;tlcv.height=tlcv.clientHeight*devicePixelRatio;tlx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);drawTL();}
function t2x(t){return 10+(t/duration)*(tlcv.clientWidth-20);}
function x2t(x){return Math.max(0,Math.min(duration,Math.round((x-10)/(tlcv.clientWidth-20)*duration)));}
function drawTL(){
  const W=tlcv.clientWidth,H=tlcv.clientHeight;tlx.clearRect(0,0,W,H);
  tlx.strokeStyle='#E0E4E8';tlx.fillStyle='#99A1A9';tlx.font='9px IBM Plex Mono';tlx.lineWidth=1;
  for(let t=0;t<=duration;t++){const x=t2x(t);tlx.globalAlpha=t%5===0?.9:.35;tlx.beginPath();tlx.moveTo(x,18);tlx.lineTo(x,H-6);tlx.stroke();if(t%5===0){tlx.globalAlpha=1;tlx.fillText(t+'s',x+2,12);}}
  tlx.globalAlpha=1;
  // 키프레임
  keyframes.forEach(k=>{const x=t2x(k.time);tlx.fillStyle=k.id===selKf?'#2F6FED':'#1A1F24';tlx.beginPath();tlx.moveTo(x,H/2-7);tlx.lineTo(x+7,H/2);tlx.lineTo(x,H/2+7);tlx.lineTo(x-7,H/2);tlx.closePath();tlx.fill();});
  // 플레이헤드
  const px=t2x(curT);tlx.strokeStyle='#2F9461';tlx.lineWidth=1.5;tlx.beginPath();tlx.moveTo(px,16);tlx.lineTo(px,H-4);tlx.stroke();
  document.getElementById('tlInfo').textContent='키프레임 '+keyframes.length;
  document.getElementById('tlTime').textContent=curT.toFixed(1)+'s';
}
function addKf(){const t=Math.round(curT);keyframes=keyframes.filter(k=>k.time!==t);const k={id:++kfId,time:t,pose:poseNow()};keyframes.push(k);keyframes.sort((a,b)=>a.time-b.time);selKf=k.id;drawTL();}
function delKf(){if(selKf==null)return;keyframes=keyframes.filter(k=>k.id!==selKf);selKf=null;drawTL();}
function sampleAt(t){
  if(!keyframes.length)return;
  const ks=keyframes;
  if(t<=ks[0].time){applyPose(ks[0].pose);return;}
  if(t>=ks[ks.length-1].time){applyPose(ks[ks.length-1].pose);return;}
  for(let i=0;i<ks.length-1;i++){if(t>=ks[i].time&&t<=ks[i+1].time){const a=ks[i],b=ks[i+1];const u=(t-a.time)/(b.time-a.time||1);const p={};movJoints.forEach(j=>{const va=a.pose[j.name]??0,vb=b.pose[j.name]??0;p[j.name]=va+(vb-va)*u;});applyPose(p);return;}}
}
tlcv.addEventListener('mousedown',e=>{
  const r=tlcv.getBoundingClientRect(),x=e.clientX-r.left,y=e.clientY-r.top;
  // 키프레임 클릭?
  let hit=null;keyframes.forEach(k=>{if(Math.abs(t2x(k.time)-x)<9&&Math.abs(y-tlcv.clientHeight/2)<12)hit=k;});
  if(hit){selKf=hit.id;applyPose(hit.pose);curT=hit.time;}else{curT=x2t(x);sampleAt(curT);}
  drawTL();
});
document.getElementById('tlAdd').addEventListener('click',addKf);
document.getElementById('tlDel').addEventListener('click',delKf);
document.getElementById('tlDur').addEventListener('change',function(){duration=Math.max(1,+this.value||30);this.value=duration;if(curT>duration)curT=duration;drawTL();});
document.getElementById('tlSpeed').addEventListener('change',function(){playSpeed=+this.value;});
document.getElementById('tlLoop').addEventListener('click',function(){loopMode=!loopMode;this.classList.toggle('on',loopMode);});
document.getElementById('tlPlay').addEventListener('click',function(){playing=!playing;this.textContent=playing?'⏸':'▶';lastFrame=performance.now();if(playing&&curT>=duration)curT=0;});
document.getElementById('tlStop').addEventListener('click',()=>{playing=false;document.getElementById('tlPlay').textContent='▶';curT=0;sampleAt(0);drawTL();});
document.getElementById('tlSave').addEventListener('click',()=>{
  const data={duration,keyframes:keyframes.map(k=>({time:k.time,pose:k.pose}))};
  const a=document.createElement('a');a.download='so101_motion.json';a.href=URL.createObjectURL(new Blob([JSON.stringify(data,null,2)],{type:'application/json'}));a.click();
});
document.getElementById('tlLoad').addEventListener('click',()=>document.getElementById('tlFile').click());
document.getElementById('tlFile').addEventListener('change',async e=>{
  const f=e.target.files[0];if(!f)return;const d=JSON.parse(await f.text());
  duration=d.duration||30;document.getElementById('tlDur').value=duration;
  keyframes=(d.keyframes||[]).map(k=>({id:++kfId,time:k.time,pose:k.pose}));keyframes.sort((a,b)=>a.time-b.time);
  selKf=null;curT=0;sampleAt(0);drawTL();e.target.value='';
});
new ResizeObserver(tlResize).observe(tlcv);

// ───────── 렌더 루프 ─────────
function loop(now){
  requestAnimationFrame(loop);
  if(playing){const dt=(now-lastFrame)/1000*playSpeed;lastFrame=now;curT+=dt;
    if(curT>=duration){if(loopMode)curT=0;else{curT=duration;playing=false;document.getElementById('tlPlay').textContent='▶';}}
    sampleAt(curT);drawTL();
  }
  renderer.render(scene,camera);
}
resize();orbit.update();requestAnimationFrame(loop);
autoLoad();
</script>
